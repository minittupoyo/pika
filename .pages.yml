media:
  input: public/images
  output: /images

content:
  - name: blog
    label: ブログ
    type: collection
    path: content/blog
    filename:
      template: "{primary}.md"
      field: true
    delimiters: "---"
    fields:
      - name: title
        label: タイトル
        type: string
        required: true
      - name: description
        label: 説明
        type: string
        required: true
      - name: emoji
        label: 絵文字
        type: string
      - name: date
        label: 日時
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm
      - name: tags
        label: タグ
        type: string
        list: true
      - name: draft
        label: 下書き
        type: boolean
        default: false
      - name: body
        label: 本文
        type: rich-text
    actions:
      - name: deploy
        label: デプロイ
        scope: collection
        workflow: pages-deploy.yml
      - name: deploy
        label: デプロイ
        scope: entry
        workflow: pages-deploy.yml
        